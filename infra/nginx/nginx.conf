# HElbaron — nginx in front of php-fpm (Laravel API/admin) and Next.js (web).
# Included as conf.d/default.conf, i.e. inside the http{} context, so http-level
# directives (limit_req_zone, upstream, map, gzip) are valid at the top of this file.

# --- Edge rate limiting (per client IP; defence in depth, app throttling still applies) ---
limit_req_zone $binary_remote_addr zone=helbaron_auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=helbaron_checkout:10m rate=30r/m;

# --- Next.js upstream ---
upstream helbaron_web {
    server web:3000;
    keepalive 32;
}

# --- gzip for text-ish payloads ---
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_comp_level 5;
gzip_types text/plain text/css text/xml application/json application/javascript application/xml application/xml+rss image/svg+xml;

# WebSocket upgrade passthrough for the Next.js proxy.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    client_max_body_size 52M;
    server_tokens off;

    # ---------------- Laravel / php-fpm ----------------
    # Health probes bypass PHP where possible.
    location = /up { try_files $uri /index.php?$query_string; }

    # Sensitive API surfaces get edge rate limits on top of Laravel throttling.
    location /api/v1/auth/ {
        limit_req zone=helbaron_auth burst=20 nodelay;
        limit_req_status 429;
        try_files $uri /index.php?$query_string;
    }
    location /api/v1/checkout {
        limit_req zone=helbaron_checkout burst=10 nodelay;
        limit_req_status 429;
        try_files $uri /index.php?$query_string;
    }

    location /api/      { try_files $uri /index.php?$query_string; }
    location /admin     { try_files $uri /index.php?$query_string; }
    location /livewire  { try_files $uri /index.php?$query_string; }
    location /horizon   { try_files $uri /index.php?$query_string; }
    location /storage/  { try_files $uri /index.php?$query_string; }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass api:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param HTTP_X_CORRELATION_ID $http_x_correlation_id;
        fastcgi_read_timeout 30s;
    }

    location ~ /\.(?!well-known).* { deny all; }

    # ---------------- Everything else → Next.js ----------------
    location / {
        proxy_pass http://helbaron_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Correlation-ID $http_x_correlation_id;
        proxy_read_timeout 60s;
    }
}
