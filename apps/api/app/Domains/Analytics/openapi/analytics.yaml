openapi: 3.1.0
info:
  title: HElbaron — Analytics API
  version: "1.0"
  description: >
    Analytics endpoints (Step 11). A read-model domain: KPIs, reports, dashboards, and async
    exports all read the metric_snapshots read model (never operational tables). No charts.
    Entities use public_id.
servers:
  - url: /api/v1
security:
  - sanctum: []
tags: [{ name: Reports }, { name: Dashboards }, { name: KPIs }, { name: Exports }]

components:
  securitySchemes:
    sanctum: { type: http, scheme: bearer }

paths:
  /reports:
    get:
      tags: [Reports]
      summary: List report definitions
      responses: { "200": { description: OK } }
  /reports/{report}:
    get:
      tags: [Reports]
      summary: Show a report definition
      parameters: [{ name: report, in: path, required: true, schema: { type: string } }]
      responses: { "200": { description: OK } }
  /reports/run:
    post:
      tags: [Reports]
      summary: Run a report against the read model (records a ReportRun)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [report]
              properties:
                report: { type: string, description: report public_id }
                from: { type: string, format: date }
                to: { type: string, format: date }
      responses: { "200": { description: Report result }, "404": { description: Not found } }
  /dashboards:
    get:
      tags: [Dashboards]
      summary: List dashboards with widgets
      responses: { "200": { description: OK } }
  /analytics/kpis:
    get:
      tags: [KPIs]
      summary: KPI totals + series for a set of metrics over a range (from the read model)
      parameters:
        - { name: "metrics[]", in: query, required: true, schema: { type: array, items: { type: string } } }
        - { name: from, in: query, schema: { type: string, format: date } }
        - { name: to, in: query, schema: { type: string, format: date } }
      responses: { "200": { description: KPI values } }
  /analytics/exports:
    post:
      tags: [Exports]
      summary: Queue an asynchronous export (CSV/XLSX) of a report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [report, format]
              properties:
                report: { type: string }
                format: { type: string, enum: [csv, xlsx] }
                from: { type: string, format: date }
                to: { type: string, format: date }
      responses: { "201": { description: Export queued } }
  /analytics/exports/{export}:
    get:
      tags: [Exports]
      summary: Export status + signed download URL when completed
      parameters: [{ name: export, in: path, required: true, schema: { type: string } }]
      responses: { "200": { description: OK } }
  /analytics/exports/{export}/file:
    get:
      tags: [Exports]
      summary: Stream the export file (reached only via a signed URL; no storage path exposed)
      parameters: [{ name: export, in: path, required: true, schema: { type: string } }]
      responses: { "200": { description: File stream }, "404": { description: Not ready } }
