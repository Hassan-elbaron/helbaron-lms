# HElbaron — production stack (compose). One image, three roles: web (fpm), horizon, scheduler.
# Secrets come from an out-of-band .env.production (never committed). TLS terminates upstream
# (ALB/CloudFront); nginx here speaks HTTP on the private network.
services:
  api:
    image: ${HELBARON_IMAGE:-helbaron-api:1.0.0-rc.1}
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: always
    env_file: [./apps/api/.env.production]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "SCRIPT_FILENAME=/ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  web:
    image: ${HELBARON_WEB_IMAGE:-helbaron-web:1.0.0-rc.1}
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: always
    # NEXT_PUBLIC_* and server-side runtime env come from an out-of-band env file.
    env_file: [./apps/web/.env.production]
    depends_on:
      api: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on: [api, web]
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"

  horizon:
    image: ${HELBARON_IMAGE:-helbaron-api:1.0.0-rc.1}
    restart: always
    env_file: [./apps/api/.env.production]
    command: ["php", "artisan", "horizon"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "php artisan horizon:status | grep -q running || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  scheduler:
    image: ${HELBARON_IMAGE:-helbaron-api:1.0.0-rc.1}
    restart: always
    env_file: [./apps/api/.env.production]
    command: ["php", "artisan", "schedule:work"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  postgres:
    image: postgres:16-alpine
    restart: always
    env_file: [./apps/api/.env.production]
    environment:
      POSTGRES_DB: ${DB_DATABASE:-helbaron}
      POSTGRES_USER: ${DB_USERNAME:-helbaron}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set in .env.production}
    volumes:
      - helbaron-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-helbaron}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Scheduled logical backups: pg_dump into ./backups on the host, with retention.
  # Env-driven (DB_* comes from .env.production via env_file). For ad-hoc/off-schedule
  # backups use scripts/backup.sh; for restore drills use scripts/verify-backup.sh.
  db-backup:
    image: postgres:16-alpine
    restart: always
    env_file: [./apps/api/.env.production]
    environment:
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    depends_on:
      postgres: { condition: service_healthy }
    volumes:
      - ./backups:/backups
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        export PGPASSWORD="$$DB_PASSWORD"
        echo "db-backup: every $${BACKUP_INTERVAL_SECONDS}s, retention $${BACKUP_RETENTION_DAYS}d"
        while true; do
          ts="$$(date +%Y%m%d-%H%M%S)"
          out="/backups/db-$$ts.sql.gz"
          if pg_dump --clean --if-exists -h postgres -U "$${DB_USERNAME:-helbaron}" "$${DB_DATABASE:-helbaron}" | gzip > "$$out"; then
            echo "db-backup: wrote $$out ($$(wc -c < "$$out") bytes)"
          else
            echo "db-backup: FAILED at $$ts" >&2
            rm -f "$$out"
          fi
          find /backups -name 'db-*.sql.gz' -mtime +"$${BACKUP_RETENTION_DAYS}" -print -delete
          sleep "$${BACKUP_INTERVAL_SECONDS}"
        done

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec", "--maxmemory-policy", "noeviction"]
    volumes:
      - helbaron-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  helbaron-pgdata:
  helbaron-redisdata:
