# HElbaron — production stack (compose). One image, three roles: web (fpm), horizon, scheduler.
# Secrets come from an out-of-band .env.production (never committed). TLS terminates upstream
# (ALB/CloudFront); nginx here speaks HTTP on the private network.
services:
  api:
    image: ${HELBARON_IMAGE:-helbaron-api:1.0.0-rc.1}
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: always
    env_file: [./apps/api/.env.production]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "SCRIPT_FILENAME=/ping REQUEST_METHOD=GET cgi-fcgi -bind -connect 127.0.0.1:9000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  nginx:
    image: nginx:1.27-alpine
    restart: always
    depends_on: [api]
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"

  horizon:
    image: ${HELBARON_IMAGE:-helbaron-api:1.0.0-rc.1}
    restart: always
    env_file: [./apps/api/.env.production]
    command: ["php", "artisan", "horizon"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "php artisan horizon:status | grep -q running || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  scheduler:
    image: ${HELBARON_IMAGE:-helbaron-api:1.0.0-rc.1}
    restart: always
    env_file: [./apps/api/.env.production]
    entrypoint: ["/bin/sh", "-c"]
    command: ["while true; do php artisan schedule:run --no-interaction; sleep 60; done"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }

  postgres:
    image: postgres:16-alpine
    restart: always
    env_file: [./apps/api/.env.production]
    environment:
      POSTGRES_DB: ${DB_DATABASE:-helbaron}
      POSTGRES_USER: ${DB_USERNAME:-helbaron}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set in .env.production}
    volumes:
      - helbaron-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-helbaron}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes", "--appendfsync", "everysec", "--maxmemory-policy", "noeviction"]
    volumes:
      - helbaron-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  helbaron-pgdata:
  helbaron-redisdata:
