; Docker-only PHP override for the HElbaron API dev container.
; Ensures $_ENV is populated from the container environment (E) so the docker-compose
; `environment:` values (DB_HOST=postgres, DB_PORT=5432, REDIS_HOST=redis) are honored by
; php artisan serve's workers, which otherwise read .env's host-oriented defaults.
; This keeps apps/api/.env at host values (127.0.0.1:55432) for non-Docker execution while
; the container connects to the compose services. Applied via a read-only volume mount in
; docker-compose.yml (no image rebuild needed); take effect with: docker compose up -d --force-recreate api
variables_order = "EGPCS"
