name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API (Laravel 12 / PHP 8.3)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_DB: helbaron, POSTGRES_USER: helbaron, POSTGRES_PASSWORD: secret }
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U helbaron" --health-interval=10s --health-timeout=5s --health-retries=5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=5
    defaults: { run: { working-directory: apps/api } }
    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: helbaron
      DB_USERNAME: helbaron
      DB_PASSWORD: secret
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      REDIS_CLIENT: predis
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, pgsql, mbstring, bcmath, intl, zip, pcntl
          coverage: none
      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: apps/api/vendor
          key: composer-${{ hashFiles('apps/api/composer.lock') }}
      - run: composer install --prefer-dist --no-interaction --no-progress
      - name: Security audit (composer)              # blocking
        run: composer audit
      - run: cp .env.example .env && php artisan key:generate
      - name: Lint (Pint)
        run: vendor/bin/pint --test
      - name: Static analysis (PHPStan/Larastan)   # blocking (level 6 + custom architecture rules)
        run: vendor/bin/phpstan analyse --no-progress
      - name: Ensure Rector is installed
        continue-on-error: true
        run: test -x vendor/bin/rector || composer require --dev rector/rector --no-interaction
      - name: Rector (dry-run, report-only)         # non-blocking modernization/quality report
        continue-on-error: true
        run: vendor/bin/rector process --dry-run --no-progress-bar
      - name: Migrate
        run: php artisan migrate --force
      - name: Tests (Pest)
        run: php artisan test

  architecture:
    name: Architecture (Deptrac)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/api } }
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl
          coverage: none
      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: apps/api/vendor
          key: composer-${{ hashFiles('apps/api/composer.lock') }}
      - run: composer install --prefer-dist --no-interaction --no-progress
      # Deptrac is expected in require-dev; install on the fly until that lands.
      - name: Ensure Deptrac is installed
        run: test -x vendor/bin/deptrac || composer require --dev deptrac/deptrac --no-interaction
      # Enforces bounded-context boundaries (deptrac.yaml + deptrac.baseline.yaml).
      # Fails ONLY on NEW violations; existing coupling is absorbed by the committed baseline.
      # Human-readable table output; non-zero exit blocks the PR.
      - name: Deptrac (architecture boundaries)
        run: vendor/bin/deptrac analyse --no-progress

  web:
    name: Web (Next.js 15 / Node 20)
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: apps/web/package-lock.json }
      - run: npm ci
      - name: Security audit (npm, production deps)       # blocking
        # Production dependencies must be clean at high+. Dev-only advisories (test runner,
        # bundler dev server) are surfaced by the report-only step below and tracked in
        # docs/reviews, not blocked here — they never ship in the production bundle.
        run: npm audit --omit=dev --audit-level=high
      - name: Security audit (npm, all — report only)
        continue-on-error: true
        run: npm audit --audit-level=high
      - name: Lint (ESLint + architectural boundaries)   # blocking
        run: npm run lint
      - name: Typecheck (tsc --noEmit)                    # blocking
        run: npm run typecheck
      - run: npm test
      - run: npm run build

  secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  e2e:
    name: E2E (Playwright + axe)
    runs-on: ubuntu-latest
    # Blocking gate. The Playwright webServer boots a deterministic mock API
    # (apps/web/e2e/support/mock-api.mjs) + the Next app, so no external backend is needed; the
    # public smoke journeys and WCAG a11y checks (with an independent oklch/alpha contrast recheck)
    # must pass. The visual-regression project is intentionally excluded here — it is baseline-
    # dependent and advisory, not a correctness gate.
    defaults: { run: { working-directory: apps/web } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm', cache-dependency-path: apps/web/package-lock.json }
      - run: npm ci
      - name: Install Playwright browser (chromium)
        run: npx playwright install --with-deps chromium
      - name: Run smoke + a11y (chromium, headless)    # blocking
        run: npx playwright test --project=chromium
      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with: { name: playwright-report, path: apps/web/playwright-report, retention-days: 7 }

  image-api:
    name: API image (build, scan, push on main/tags)
    runs-on: ubuntu-latest
    needs: [api]
    permissions:
      contents: read
      packages: write
    env:
      DO_PUSH: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Compute image name (GHCR requires lowercase)
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/api" >> "$GITHUB_ENV"
      - name: Log in to GHCR
        if: env.DO_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image (loaded locally for scanning)
        uses: docker/build-push-action@v6
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile
          push: false
          load: true
          tags: |
            ${{ env.IMAGE }}:sha-${{ github.sha }}
            ${{ env.IMAGE }}:latest
      - name: Trivy scan (CRITICAL/HIGH block)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:sha-${{ github.sha }}
          format: table
          output: trivy-api.txt
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
      # Surface the full findings in the job summary (visibility only — the blocking scan above is
      # unchanged: it still fails the job on any CRITICAL/HIGH). Runs even when the scan fails.
      - name: Publish Trivy report to job summary
        if: always()
        run: |
          {
            echo '### Trivy — API image (CRITICAL/HIGH, ignore-unfixed)';
            echo '```';
            cat trivy-api.txt 2>/dev/null || echo '(no report produced)';
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Push to GHCR (main/tags only)
        if: env.DO_PUSH == 'true'
        run: |
          docker push "$IMAGE:sha-$GITHUB_SHA"
          docker push "$IMAGE:latest"

  image-web:
    name: Web image (build, scan, push on main/tags)
    runs-on: ubuntu-latest
    needs: [web]
    permissions:
      contents: read
      packages: write
    env:
      DO_PUSH: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Compute image name (GHCR requires lowercase)
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}/web" >> "$GITHUB_ENV"
      - name: Log in to GHCR
        if: env.DO_PUSH == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build image (loaded locally for scanning)
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          file: ./apps/web/Dockerfile
          push: false
          load: true
          tags: |
            ${{ env.IMAGE }}:sha-${{ github.sha }}
            ${{ env.IMAGE }}:latest
      - name: Trivy scan (CRITICAL/HIGH block)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:sha-${{ github.sha }}
          format: table
          output: trivy-web.txt
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
      # Surface the full findings in the job summary (visibility only — the blocking scan above is
      # unchanged: it still fails the job on any CRITICAL/HIGH). Runs even when the scan fails.
      - name: Publish Trivy report to job summary
        if: always()
        run: |
          {
            echo '### Trivy — Web image (CRITICAL/HIGH, ignore-unfixed)';
            echo '```';
            cat trivy-web.txt 2>/dev/null || echo '(no report produced)';
            echo '```';
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Push to GHCR (main/tags only)
        if: env.DO_PUSH == 'true'
        run: |
          docker push "$IMAGE:sha-$GITHUB_SHA"
          docker push "$IMAGE:latest"
